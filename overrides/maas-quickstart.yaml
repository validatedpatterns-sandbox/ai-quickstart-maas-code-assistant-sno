devspaces:
  enabled: true
  namespace: openshift-devspaces
grafana:
  enabled: true
  namespace: grafana
  selectors:
    app: grafana
cluster-monitoring:
  enabled: true

tiers:
  free:
    users:
      - free-user
    requestRates:
      - limit: 5
        window: 2m
    tokenRates:
      - limit: 100
        window: 1m
  premium:
    users:
      - premium-user
    requestRates:
      - limit: 20
        window: 2m
    tokenRates:
      - limit: 10000
        window: 1m
  enterprise:
    users:
      - admin
      - enterprise-user
    requestRates:
      - limit: 50
        window: 2m
    tokenRates:
      - limit: 20000
        window: 1m

models:
  - name: gpt-oss-20b
    displayName: OpenAI gpt-oss-20b
    uri: oci://registry.redhat.io/rhelai1/modelcar-gpt-oss-20b:1.5
    resources:
      limits:
        cpu: "4"
        memory: 24Gi
        nvidia.com/gpu: "1"
      requests:
        cpu: "2"
        memory: 16Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --enable-force-include-usage
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
  - name: nemotron-3-nano-30b-a3b
    displayName: NVIDIA Nemotron 3 Nano 30B A3B FP8
    tiers:
      - premium
      - enterprise
    uri: oci://quay.io/jharmison/models:redhatai--nvidia-nemotron-3-nano-30b-a3b-fp8-modelcar
    resources:
      limits:
        cpu: "4"
        memory: 24Gi
        nvidia.com/gpu: "1"
      requests:
        cpu: "2"
        memory: 16Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --enable-force-include-usage
      - --max-model-len=16384
      - --enable-auto-tool-choice
      - --tool-call-parser=qwen3_coder
      - --trust-remote-code
      - --enforce-eager
      - --reasoning-parser-plugin=/mnt/models/nano_v3_reasoning_parser.py
      - --reasoning-parser=nano_v3
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
