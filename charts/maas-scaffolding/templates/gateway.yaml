apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
  labels:
    opendatahub.io/managed: "false"
  annotations:
    opendatahub.io/managed: "false"
    security.opendatahub.io/authorino-tls-bootstrap: "true"
spec:
  gatewayClassName: openshift-default
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: maas.{{ .Values.global.localClusterDomain }}
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      hostname: maas.{{ .Values.global.localClusterDomain }}
      tls:
        certificateRefs:
        - group: ""
          kind: Secret
          name:
        mode: Terminate
      allowedRoutes:
        namespaces:
          from: All
