clusterGroup:
  name: prod

  namespaces:
    - ai-quickstart-maas-code-assistant:
    - vault:
    - external-secrets-operator:
        operatorGroup: true
        targetNamespaces: []
    - external-secrets:
    - openshift-lws-operator:
        operatorGroup: true
        targetNamespaces:
          - openshift-lws-operator
    - cert-manager-operator:
        operatorGroup: true
        targetNamespaces: []
    - keycloak:
        operatorGroup: true
        targetNamespaces:
          - keycloak
    - redhat-ods-operator:
        operatorGroup: true
        targetNamespaces: []
    - kuadrant-system:

  subscriptions:
    eso:
      name: openshift-external-secrets-operator
      namespace: external-secrets-operator
      channel: stable-v1
    postgres:
      name: cloudnative-pg
      channel: stable-v1
      source: certified-operators
    devspaces:
      name: devspaces
    grafana:
      name: grafana-operator
      channel: v5
      source: community-operators
    lws:
      name: leader-worker-set
      channel: stable-v1.0
    cert-manager:
      name: openshift-cert-manager-operator
      channel: stable-v1
    keycloak:
      name: rhbk-operator
      channel: stable-v26.4
    kuadrant:
      name: rhcl-operator
    rhoai:
      name: rhods-operator
      channel: stable-3.3

  applications:
    openshift-external-secrets:
      name: openshift-external-secrets
      namespace: external-secrets
      chart: openshift-external-secrets
      chartVersion: 0.0.*
    vault:
      name: vault
      namespace: vault
      chart: hashicorp-vault
      chartVersion: 0.1.*
    maas-scaffolding:
      name: maas-scaffolding
      namespace: ai-quickstart-maas-code-assistant
      path: charts/maas-scaffolding
